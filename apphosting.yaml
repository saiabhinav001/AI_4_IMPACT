# Firebase App Hosting runtime configuration for Next.js App Router.
# Keep this conservative for initial cutover while registrations are active.
runConfig:
  minInstances: 1
  maxInstances: 20
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: FEATURE_ADMIN_READ_MODEL_ENABLED
    value: "true"
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FEATURE_ADMIN_CLIENT_FALLBACK_ENABLED
    value: "false"
    availability:
      - BUILD
      - RUNTIME

  - variable: FEATURE_PAYMENT_SCREENSHOT_COMPRESSION_ENABLED
    value: "true"
    availability:
      - RUNTIME

  - variable: ADMIN_REGISTRATIONS_CACHE_TTL_MS
    value: "300000"
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_POLL_DEFAULT_MS
    value: "180000"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_POLL_HIDDEN_MS
    value: "300000"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_POLL_FAST_MS
    value: "15000"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_POLL_FAST_WINDOW_MS
    value: "90000"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_PERIODIC_FRESH_MS
    value: "900000"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_REGISTRATIONS_PAGE_LIMIT
    value: "120"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ADMIN_REGISTRATIONS_MAX_PAGES
    value: "8"
    availability:
      - BUILD
      - RUNTIME

  - variable: CREDENTIAL_SHEET_SYNC_ENABLED
    value: "true"
    availability:
      - RUNTIME

  - variable: GOOGLE_SHEETS_SPREADSHEET_ID
    value: "1K-xN8FtkpG1Y5diqRPY-DksJZkkGGpkxU9mSGA5lxnU"
    availability:
      - RUNTIME

  - variable: GOOGLE_SHEETS_WORKSHEET
    value: "Sheet1"
    availability:
      - RUNTIME
