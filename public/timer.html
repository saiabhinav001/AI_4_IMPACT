<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 4 IMPACT | HACKATHON_TIMER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;900&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00FFFF;
            --neon-purple: #8D36D5;
            --dark-bg: #07020E;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark-bg);
            color: #EDE8F5;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(141, 54, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.1) 0%, transparent 40%);
        }

        /* Abstract Grid Pattern */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.2;
            z-index: -1;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
        }

        .header {
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 9999px;
            margin-bottom: 1.5rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.3em;
            color: #10b981;
            text-transform: uppercase;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, rgba(255, 255, 255, 0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--neon-cyan);
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.8;
        }

        .timer-grid {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            perspective: 1000px;
        }

        .timer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem 1.5rem;
            border-radius: 32px;
            min-width: 160px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .timer-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .timer-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 255, 255, 0.3);
        }

        .timer-card:hover::after {
            opacity: 1;
        }

        .timer-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            margin-bottom: 0.5rem;
            display: block;
        }

        .timer-label {
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--neon-purple);
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        .separator {
            font-size: 4rem;
            font-weight: 100;
            color: var(--border);
            display: flex;
            align-items: center;
            padding-bottom: 2rem;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .timer-grid {
                gap: 1rem;
                flex-wrap: wrap;
            }

            .timer-card {
                min-width: 120px;
                padding: 1.5rem 1rem;
            }

            .timer-value {
                font-size: 3rem;
            }

            h1 {
                font-size: 2.5rem;
            }

            .separator {
                display: none;
            }
        }

        .footer-note {
            margin-top: 4rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span class="status-text">Hackathon_In_Progress</span>
            </div>
            <h1>AI 4 IMPACT</h1>
            <p class="subtitle">System_Runtime_Remaining</p>
        </header>

        <main class="timer-grid">
            <div class="timer-card">
                <span class="timer-value" id="hours">30</span>
                <span class="timer-label">Hours</span>
            </div>
            <div class="separator">:</div>
            <div class="timer-card">
                <span class="timer-value" id="minutes">00</span>
                <span class="timer-label">Minutes</span>
            </div>
            <div class="separator">:</div>
            <div class="timer-card">
                <span class="timer-value" id="seconds">00</span>
                <span class="timer-label">Seconds</span>
            </div>
        </main>

    </div>

    <div id="overlay" style="position: fixed; inset: 0; background: var(--dark-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;">
        <div class="status-badge">
            <span class="status-dot" style="background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan);"></span>
            <span class="status-text" style="color: var(--neon-cyan);">System_Standby</span>
        </div>
        <button onclick="activateSystem()" style="background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 1.5rem 3rem; border-radius: 16px; font-family: 'JetBrains Mono'; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; cursor: pointer; transition: all 0.3s; font-size: 0.875rem;">
            [ ACTIVATE_SYSTEM ]
        </button>
    </div>

    <script>
        let targetTime = null;
        let timerStarted = false;

        function activateSystem() {
            // Request Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            // Hide overlay
            document.getElementById('overlay').style.display = 'none';

            // Wait 2 seconds before starting the countdown
            setTimeout(() => {
                const DURATION_MS = 30 * 60 * 60 * 1000;
                targetTime = Date.now() + DURATION_MS;
                timerStarted = true;
                
                // Initial update
                updateTimer();
                // Start interval
                setInterval(updateTimer, 1000);
            }, 2000);
        }

        function updateTimer() {
            if (!timerStarted) return;

            const now = Date.now();
            const diff = targetTime - now;

            if (diff <= 0) {
                document.getElementById('hours').innerText = '00';
                document.getElementById('minutes').innerText = '00';
                document.getElementById('seconds').innerText = '00';
                return;
            }

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');
        }
    </script>
</body>
</html>
